name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual fallback so a missed push webhook (rare GitHub Actions hiccup)
  # can be re-triggered without an empty commit. `gh workflow run ci.yml
  # --ref main` will queue a fresh run on the current `main` HEAD.
  workflow_dispatch:

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # P0.3 — declare the single-threaded determinism contract at the CI level,
    # not only inside scripts/self-test.sh. RUST_TEST_THREADS=1 keeps the gate's
    # ordering deterministic (shared temp dirs, port binds, ledger paths) so a
    # CI runner cannot reorder tests into a flake the local gate never sees. The
    # master plan P0.3 contract requires this in BOTH the script and the
    # workflow file.
    env:
      RUST_TEST_THREADS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # P0.7 (audit) — pin the third-party action to an immutable commit SHA
        # (was @master): a mutable ref is arbitrary-code-execution-on-push.
        # SHA = dtolnay/rust-toolchain master @ 2026-06; bump deliberately.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          # P0.7 (audit) — fetch the elan installer from an immutable release
          # tag (was `master`, a mutable branch tip).
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/v4.2.3/elan-init.sh -o /tmp/elan-init.sh
          sh /tmp/elan-init.sh -y --default-toolchain leanprover/lean4:v4.29.1
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          # P0.7 (audit) — verify the published SHA-256 before trusting the
          # binary (mirrors the cargo-deny download in the supply-chain job).
          echo "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Boole self-test
        run: ./scripts/self-test.sh

      # P0.7 (audit) — the self-test gate only builds the dev profile, so the
      # release profile (panic = "abort", opt-level, overflow checks elided)
      # ships entirely unexercised. Build the shipped binaries in release here
      # so a release-only miscompile or panic-strategy regression fails CI,
      # not production.
      - name: Build release binaries
        run: >-
          cargo build --release --locked
          -p boole-node -p boole-cli -p boole-miner
          -p boole-mcp -p boole-wallet-agent

  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # P0.7 (audit) — pin the third-party action to an immutable commit SHA
        # (was @master): a mutable ref is arbitrary-code-execution-on-push.
        # SHA = dtolnay/rust-toolchain master @ 2026-06; bump deliberately.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.95.0

      - name: Install cargo-deny
        shell: bash
        # Bumped from 0.16.4 -> 0.19.7: 0.16.x cannot parse RustSec advisory
        # entries that use the CVSS 4.0 vector format, which the advisory-db
        # adopted in 2026. 0.17+ pulls in `rustsec` crate >= 0.30 that knows
        # CVSS 4.0; 0.19.7 is the current upstream release.
        env:
          CARGO_DENY_VERSION: "0.19.7"
        run: |
          set -euo pipefail
          asset="cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          base="https://github.com/EmbarkStudios/cargo-deny/releases/download/${CARGO_DENY_VERSION}"
          curl -sSfL "${base}/${asset}" -o /tmp/cargo-deny.tar.gz
          curl -sSfL "${base}/${asset}.sha256" -o /tmp/cargo-deny.tar.gz.sha256
          # Upstream .sha256 contains just the hex digest (no filename), so
          # rewrite it into the GNU coreutils-friendly "<digest>  <file>"
          # form before handing it to sha256sum -c.
          digest=$(awk '{print $1}' /tmp/cargo-deny.tar.gz.sha256)
          printf '%s  %s\n' "${digest}" /tmp/cargo-deny.tar.gz > /tmp/cargo-deny.tar.gz.sha256.check
          sha256sum -c /tmp/cargo-deny.tar.gz.sha256.check
          tar -xzf /tmp/cargo-deny.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/cargo-deny-${CARGO_DENY_VERSION}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/cargo-deny
          cargo-deny --version

      - name: Install cargo-audit
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked cargo-audit

      - name: cargo deny check
        run: cargo deny --all-features check advisories bans licenses sources

      - name: cargo audit
        run: cargo audit --deny warnings
