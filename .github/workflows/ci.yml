name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  self-test:
    name: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install Lean toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o /tmp/elan-init.sh
          sh /tmp/elan-init.sh -y --default-toolchain leanprover/lean4:v4.29.1
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run Boole self-test
        run: ./scripts/self-test.sh
