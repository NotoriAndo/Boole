# P0.7 — cargo-deny policy for Boole supply-chain gate (L0).
#
# Required CI jobs:
#   cargo deny check advisories bans licenses sources
#   cargo audit
#
# Tightenings deferred to later P0.7 follow-ups:
#   - `multiple-versions = "deny"` once the duplicate-version drift is paid down
#   - explicit `[bans] deny = [...]` allowlist for security-sensitive crates

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  # webpki-roots ships under CDLA-Permissive-2.0 — a permissive data license
  # used to redistribute Mozilla's root CA bundle through rustls' TLS stack.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# wildcards in registry deps are the headline supply-chain regression P0.7
# is meant to block. Workspace-internal path deps are exempted because they
# are not a registry-supply-chain vector.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
